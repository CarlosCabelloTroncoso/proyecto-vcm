<div class="min-h-screen grid grid-cols-1 lg:grid-cols-2">

  <!-- LADO IZQUIERDO -->
  <div class="flex items-center justify-center bg-gray-100 px-8 py-12">

    <div class="w-full max-w-md flex flex-col">

      <!-- LOGO -->
      <div class="mb-10 flex justify-center">
        <img
          src="/assets/ucmito.png"
          alt="logo animado"
          class="block w-32 h-auto"
        >
      </div>

      <!-- TÍTULO -->
      <h1 class="text-4xl font-bold text-gray-900 text-center">
        Inicio De Sesión
      </h1>

      <!-- FORM -->
      <form class="mt-10 space-y-6">

        <!-- EMAIL -->
        <div>
          <label
            for="email"
            class="block text-sm font-medium text-gray-700"
          >
            Correo Electronico
          </label>

          <input
            id="email"
            type="email"
            placeholder="correo@ejemplo.com"
            class="mt-2 w-full rounded-md border border-gray-300 bg-white px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 transition"
          />
        </div>

        <!-- PASSWORD -->
        <div>

          <div class="flex items-center justify-between">

            <label
              for="password"
              class="block text-sm font-medium text-gray-700"
            >
              Contraseña
            </label>

            <a
              href="#"
              class="text-sm font-semibold text-blue-600 hover:text-blue-500"
            >
              ¿Olvidaste tu contraseña?
            </a>

          </div>

          <input
            id="password"
            type="password"
            placeholder="********"
            class="mt-2 w-full rounded-md border border-gray-300 bg-white px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 transition"
          />

        </div>

        <!-- BOTÓN -->
        <button
          type="submit"
          class="w-full rounded-md bg-blue-600 py-3 font-semibold text-white transition hover:bg-blue-700 active:scale-[0.98] shadow-md"
        >
          Iniciar sesión
        </button>

      </form>

      <!-- DIVIDER -->
      <div class="my-8 flex items-center">

        <div class="h-px flex-1 bg-gray-300"></div>

        <a
          routerLink="/registro"
          class="px-4 text-sm font-semibold text-blue-600 hover:text-blue-500 transition"
        >
          ¿No estás registrado?
        </a>

        <div class="h-px flex-1 bg-gray-300"></div>

      </div>

    </div>

  </div>

  <!-- LADO DERECHO -->
  <div class="hidden lg:block">

    <img
      src="/assets/ucmportada.png"
      alt="portada"
      class="h-full w-full object-cover"
    />

  </div>

</div>
