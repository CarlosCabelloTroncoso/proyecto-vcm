<!-- Fondo institucional -->
<div class="relative min-h-screen flex items-center justify-center px-4 py-12 bg-cover bg-center bg-no-repeat"
     style="background-image: url('assets/ucmportada.png')">

  <!-- Overlay institucional -->
  <div class="absolute inset-0 bg-[#1B3A6B]/50"></div>

  <!-- Tarjeta central -->
  <div class="relative z-10 w-full max-w-xl overflow-hidden rounded-2xl bg-white shadow-2xl ring-1 ring-black/5">

    <!-- ── Header institucional ─────────────────────────────── -->
    <div class="flex flex-col items-center gap-3 bg-[#1B3A6B] px-8 py-8">
      <img src="images/escudo-ucm.png" alt="UCM"
           class="h-14 w-14 brightness-0 invert" />
      <div class="text-center">
        <p class="text-lg font-bold tracking-wide text-white">UCM Vinculación</p>
        <p class="mt-0.5 text-xs font-medium tracking-widest text-white/55 uppercase">
          Universidad Católica del Maule
        </p>
      </div>
    </div>

    <!-- ── Formulario ───────────────────────────────────────── -->
    <div class="px-8 py-8">

      <h2 class="mb-6 text-center text-xl font-bold text-[#1B3A6B]">
        Crear una cuenta
      </h2>

      <!-- Mensajes -->
      @if (errorMsg()) {
        <div class="mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">
          {{ errorMsg() }}
        </div>
      }

      @if (successMsg()) {
        <div class="mb-4 rounded-lg bg-green-50 border border-green-200 px-4 py-3 text-sm text-green-700">
          {{ successMsg() }}
        </div>
      }

      <div class="space-y-4">

        <!-- Fila 0: Tipo de documento -->
        <div>
          <label for="tipoDoc"
                 class="mb-1.5 block text-xs font-semibold uppercase tracking-wider text-[#1B3A6B]/60">
            Tipo de documento
          </label>
          <select id="tipoDoc" [(ngModel)]="tipoDocumento"
                  class="w-full rounded-xl border border-[#1B3A6B]/20 bg-white px-4 py-2.5
                         text-sm text-[#1B3A6B] outline-none shadow-sm
                         transition focus:border-[#1B3A6B]/50 focus:ring-2 focus:ring-[#1B3A6B]/15">
            <option value="rut">RUT (chileno)</option>
            <option value="pasaporte">Pasaporte (extranjero)</option>
          </select>
        </div>

        <!-- Fila 1: Documento + Teléfono -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label for="rut"
                   class="mb-1.5 block text-xs font-semibold uppercase tracking-wider text-[#1B3A6B]/60">
              {{ tipoDocumento === 'rut' ? 'RUT' : 'Pasaporte' }}
            </label>
            <div class="relative">
              <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-[#1B3A6B]/35"
                     fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M10 6H5a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-5
                       m-4 0V5a2 2 0 1 1 4 0v1m-4 0a2 2 0 1 0 4 0m-5 8a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/>
                </svg>
              </span>
              <input id="rut" type="text"
                     [placeholder]="tipoDocumento === 'rut' ? '12345678-5' : 'Ej: AB123456'"
                     [(ngModel)]="rut"
                     class="w-full rounded-xl border border-[#1B3A6B]/20 bg-white py-2.5 pl-9 pr-4
                            text-sm text-[#1B3A6B] placeholder-[#1B3A6B]/35 outline-none shadow-sm
                            transition focus:border-[#1B3A6B]/50 focus:ring-2 focus:ring-[#1B3A6B]/15" />
            </div>
          </div>

          <div>
            <label for="telefono"
                   class="mb-1.5 block text-xs font-semibold uppercase tracking-wider text-[#1B3A6B]/60">
              Teléfono
            </label>
            <div class="relative">
              <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-[#1B3A6B]/35"
                     fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M3 5a2 2 0 0 1 2-2h3.28a1 1 0 0 1 .948.684l1.498 4.493a1 1 0 0 1-.502 1.21
                       l-2.257 1.13a11.042 11.042 0 0 0 5.516 5.516l1.13-2.257a1 1 0 0 1 1.21-.502
                       l4.493 1.498A1 1 0 0 1 21 15.72V19a2 2 0 0 1-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                </svg>
              </span>
              <input id="telefono" type="tel" placeholder="+56912345678"
                     [(ngModel)]="telefono"
                     class="w-full rounded-xl border border-[#1B3A6B]/20 bg-white py-2.5 pl-9 pr-4
                            text-sm text-[#1B3A6B] placeholder-[#1B3A6B]/35 outline-none shadow-sm
                            transition focus:border-[#1B3A6B]/50 focus:ring-2 focus:ring-[#1B3A6B]/15" />
            </div>
          </div>
        </div>

        <!-- Fila 2: Nombres + Apellidos -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label for="nombres"
                   class="mb-1.5 block text-xs font-semibold uppercase tracking-wider text-[#1B3A6B]/60">
              Nombres
            </label>
            <input id="nombres" type="text" placeholder="Juan"
                   [(ngModel)]="nombres"
                   class="w-full rounded-xl border border-[#1B3A6B]/20 bg-white px-4 py-2.5
                          text-sm text-[#1B3A6B] placeholder-[#1B3A6B]/35 outline-none shadow-sm
                          transition focus:border-[#1B3A6B]/50 focus:ring-2 focus:ring-[#1B3A6B]/15" />
          </div>

          <div>
            <label for="apellidos"
                   class="mb-1.5 block text-xs font-semibold uppercase tracking-wider text-[#1B3A6B]/60">
              Apellidos
            </label>
            <input id="apellidos" type="text" placeholder="Pérez"
                   [(ngModel)]="apellidos"
                   class="w-full rounded-xl border border-[#1B3A6B]/20 bg-white px-4 py-2.5
                          text-sm text-[#1B3A6B] placeholder-[#1B3A6B]/35 outline-none shadow-sm
                          transition focus:border-[#1B3A6B]/50 focus:ring-2 focus:ring-[#1B3A6B]/15" />
          </div>
        </div>

        <!-- Fila 3: Correo -->
        <div>
          <label for="email"
                 class="mb-1.5 block text-xs font-semibold uppercase tracking-wider text-[#1B3A6B]/60">
            Correo electrónico
          </label>
          <div class="relative">
            <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-[#1B3A6B]/35"
                   fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M16 12a4 4 0 1 1-8 0 4 4 0 0 1 8 0zm0 0v1.5a2.5 2.5 0 0 0 5 0V12
                     a9 9 0 1 0-9 9m4.5-1.206a8.959 8.959 0 0 1-4.5 1.207"/>
              </svg>
            </span>
            <input id="email" type="email" placeholder="correo@ucm.cl"
                   [(ngModel)]="email"
                   class="w-full rounded-xl border border-[#1B3A6B]/20 bg-white py-2.5 pl-9 pr-4
                          text-sm text-[#1B3A6B] placeholder-[#1B3A6B]/35 outline-none shadow-sm
                          transition focus:border-[#1B3A6B]/50 focus:ring-2 focus:ring-[#1B3A6B]/15" />
          </div>
        </div>

        <!-- Fila 4: Contraseña + Confirmar -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label for="password"
                   class="mb-1.5 block text-xs font-semibold uppercase tracking-wider text-[#1B3A6B]/60">
              Contraseña
            </label>
            <div class="relative">
              <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-[#1B3A6B]/35"
                     fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 15v2m-6 4h12a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v6
                       a2 2 0 0 0 2 2zm10-10V7a4 4 0 0 0-8 0v4h8z"/>
                </svg>
              </span>
              <input id="password" type="password" placeholder="••••••••"
                     [(ngModel)]="password"
                     class="w-full rounded-xl border border-[#1B3A6B]/20 bg-white py-2.5 pl-9 pr-4
                            text-sm text-[#1B3A6B] placeholder-[#1B3A6B]/35 outline-none shadow-sm
                            transition focus:border-[#1B3A6B]/50 focus:ring-2 focus:ring-[#1B3A6B]/15" />
            </div>
          </div>

          <div>
            <label for="confirmPassword"
                   class="mb-1.5 block text-xs font-semibold uppercase tracking-wider text-[#1B3A6B]/60">
              Confirmar
            </label>
            <div class="relative">
              <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-[#1B3A6B]/35"
                     fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 15v2m-6 4h12a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v6
                       a2 2 0 0 0 2 2zm10-10V7a4 4 0 0 0-8 0v4h8z"/>
                </svg>
              </span>
              <input id="confirmPassword" type="password" placeholder="••••••••"
                     [(ngModel)]="confirmPassword"
                     (keyup.enter)="onRegistro()"
                     class="w-full rounded-xl border border-[#1B3A6B]/20 bg-white py-2.5 pl-9 pr-4
                            text-sm text-[#1B3A6B] placeholder-[#1B3A6B]/35 outline-none shadow-sm
                            transition focus:border-[#1B3A6B]/50 focus:ring-2 focus:ring-[#1B3A6B]/15" />
            </div>
          </div>
        </div>

        <!-- Botón submit -->
        <button type="button"
                (click)="onRegistro()"
                [disabled]="isLoading()"
                class="mt-2 w-full rounded-xl bg-[#1B3A6B] py-2.5 text-sm font-semibold
                       text-white shadow-sm transition hover:bg-[#1B3A6B]/85 active:scale-[0.98]
                       disabled:opacity-60 disabled:cursor-not-allowed">
          {{ isLoading() ? 'Creando cuenta...' : 'Crear cuenta' }}
        </button>

      </div>

      <!-- Divider e ir al login -->
      <div class="mt-6 flex items-center gap-3">
        <div class="h-px flex-1 bg-[#1B3A6B]/10"></div>
        <span class="text-xs font-semibold text-[#1B3A6B]">¿Ya tienes cuenta?</span>
        <div class="h-px flex-1 bg-[#1B3A6B]/10"></div>
      </div>

      <a routerLink="/login"
         class="mt-4 flex w-full items-center justify-center rounded-xl border border-[#1B3A6B]/20
                py-2.5 text-sm font-semibold text-[#1B3A6B]/70 transition
                hover:bg-[#1B3A6B]/5 hover:text-[#1B3A6B]">
        Iniciar sesión
      </a>

      <a routerLink="/"
         class="mt-3 flex w-full items-center justify-center gap-2 rounded-xl bg-[#1B3A6B]/8
                py-2.5 text-sm font-semibold text-[#1B3A6B] transition
                hover:bg-[#1B3A6B]/15 active:scale-[0.98]">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        Volver al inicio
      </a>

    </div>
  </div>

</div>
