<div class="min-h-screen grid grid-cols-1 lg:grid-cols-2">

  <!-- LADO IZQUIERDO -->
  <div class="flex items-center justify-center bg-gray-50 px-4 py-10 sm:px-8 lg:px-12">

    <div class="w-full max-w-md flex flex-col">

      <!-- Logo -->
      <div class="mb-6 flex justify-center">
        <img
          src="/assets/ucmlogo.png"
          alt="logo"
          class="h-auto w-32 object-contain"
        >
      </div>

      <!-- TÍTULO -->
      <h1 class="text-3xl font-extrabold text-gray-900 text-center tracking-tight">
        Crear una cuenta
      </h1>

      <!-- SUBTÍTULO -->
      <p class="mt-2 text-center text-sm text-gray-600">
        Ingresa tus datos para registrarte en el sistema
      </p>

      <!-- FORM -->
      <form class="mt-8 space-y-5">

        <!-- RUT -->
        <div>
          <label
            for="rut"
            class="block text-sm font-semibold text-gray-700"
          >
            RUT
          </label>

          <input
            id="rut"
            type="text"
            placeholder="12.345.678-9"
            class="mt-1 w-full rounded-lg border border-gray-300 bg-white px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
          />
        </div>

        <!-- NOMBRES Y APELLIDOS -->
        <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">

          <!-- NOMBRES -->
          <div>
            <label
              for="nombres"
              class="block text-sm font-semibold text-gray-700"
            >
              Nombres
            </label>

            <input
              id="nombres"
              type="text"
              placeholder="Juan"
              class="mt-1 w-full rounded-lg border border-gray-300 bg-white px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition"
            />
          </div>

          <!-- APELLIDOS -->
          <div>
            <label
              for="apellidos"
              class="block text-sm font-semibold text-gray-700"
            >
              Apellidos
            </label>

            <input
              id="apellidos"
              type="text"
              placeholder="Pérez"
              class="mt-1 w-full rounded-lg border border-gray-300 bg-white px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition"
            />
          </div>

        </div>

        <!-- EMAIL -->
        <div>
          <label
            for="email"
            class="block text-sm font-semibold text-gray-700"
          >
            Correo Electrónico
          </label>

          <input
            id="email"
            type="email"
            placeholder="correo@ejemplo.com"
            class="mt-1 w-full rounded-lg border border-gray-300 bg-white px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition"
          />
        </div>

        <!-- PASSWORDS -->
        <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">

          <!-- PASSWORD -->
          <div>
            <label
              for="password"
              class="block text-sm font-semibold text-gray-700"
            >
              Contraseña
            </label>

            <input
              id="password"
              type="password"
              placeholder="••••••••"
              class="mt-1 w-full rounded-lg border border-gray-300 bg-white px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition"
            />
          </div>

          <!-- CONFIRMAR PASSWORD -->
          <div>
            <label
              for="confirmPassword"
              class="block text-sm font-semibold text-gray-700"
            >
              Confirmar contraseña 
            </label>

            <input
              id="confirmPassword"
              type="password"
              placeholder="••••••••"
              class="mt-1 w-full rounded-lg border border-gray-300 bg-white px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition"
            />
          </div>

        </div>

        <!-- BOTÓN -->
        <div class="pt-2">

          <button
            type="submit"
            class="w-full rounded-lg bg-blue-600 py-3 font-bold text-white shadow-lg shadow-blue-200 transition hover:bg-blue-700 active:scale-[0.98]"
          >
            Registrarse ahora
          </button>

        </div>

      </form>

      <!-- DIVIDER -->
      <div class="mt-8 text-center">

        <p class="text-sm text-gray-600">
          ¿Ya tienes una cuenta?

          <a
            routerLink="/login"
            class="font-bold text-blue-600 hover:text-blue-500 transition"
          >
            Inicia sesión aquí
          </a>

        </p>

      </div>

    </div>

  </div>

  <!-- LADO DERECHO -->
  <div class="hidden lg:block relative">

    <img
      src="/assets/ucmportada.png"
      alt="portada"
      class="h-full w-full object-cover"
    />

    <div class="absolute inset-0 bg-blue-900/10"></div>

  </div>

</div>
