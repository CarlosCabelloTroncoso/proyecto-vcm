<div class="min-h-screen grid grid-cols-1 lg:grid-cols-2">

  <!-- LADO IZQUIERDO -->
  <div class="flex items-center justify-center bg-gray-100 px-8 py-12">

    <div class="w-full max-w-md">

      <!-- Logo -->
      <div class="mb-10">
      <img
        src="/assets/ucmlogo.png"
        alt="logo animado"
        class="block w-32"
        >
      </div>

      <!-- Título -->
      <h1 class="text-4xl font-bold text-gray-900">
        Registrarse
      </h1>

      <!-- FORM -->
      <form class="mt-10 space-y-6">

        <!-- RUT -->
        <div>
          <label
            for="rut"
            class="block text-sm font-medium text-gray-700"
          >
            Rut
          </label>

          <input
            id="rut"
            type="text"
            placeholder="12.345.678-9"
            class="mt-2 w-full rounded-md border border-gray-300 bg-white px-4 py-3 outline-none focus:border-indigo-500"
          />
        </div>

        <!-- NOMBRES -->
        <div>
          <label
            for="nombres"
            class="block text-sm font-medium text-gray-700"
          >
            Nombres
          </label>

          <input
            id="nombres"
            type="text"
            placeholder="Ingrese sus nombres"
            class="mt-2 w-full rounded-md border border-gray-300 bg-white px-4 py-3 outline-none focus:border-indigo-500"
          />
        </div>

        <!-- APELLIDOS -->
        <div>
          <label
            for="apellidos"
            class="block text-sm font-medium text-gray-700"
          >
            Apellidos
          </label>

          <input
            id="apellidos"
            type="text"
            placeholder="Ingrese sus apellidos"
            class="mt-2 w-full rounded-md border border-gray-300 bg-white px-4 py-3 outline-none focus:border-indigo-500"
          />
        </div>

        <!-- TELEFONO -->
        <div>
          <label
            for="telefono"
            class="block text-sm font-medium text-gray-700"
          >
            Teléfono
          </label>

          <input
            id="telefono"
            type="tel"
            placeholder="+56 9 1234 5678"
            class="mt-2 w-full rounded-md border border-gray-300 bg-white px-4 py-3 outline-none focus:border-indigo-500"
          />
        </div>

        <!-- EMAIL -->
        <div>
          <label
            for="email"
            class="block text-sm font-medium text-gray-700"
          >
            Correo Electrónico
          </label>

          <input
            id="email"
            type="email"
            placeholder="correo@ejemplo.com"
            class="mt-2 w-full rounded-md border border-gray-300 bg-white px-4 py-3 outline-none focus:border-indigo-500"
          />
        </div>

        <!-- PASSWORD -->
        <div>
          <label
            for="password"
            class="block text-sm font-medium text-gray-700"
          >
            Contraseña
          </label>

          <input
            id="password"
            type="password"
            placeholder="********"
            class="mt-2 w-full rounded-md border border-gray-300 bg-white px-4 py-3 outline-none focus:border-indigo-500"
          />
        </div>

        <!-- CONFIRMAR PASSWORD -->
        <div>
          <label
            for="confirmPassword"
            class="block text-sm font-medium text-gray-700"
          >
            Confirmar Contraseña
          </label>

          <input
            id="confirmPassword"
            type="password"
            placeholder="********"
            class="mt-2 w-full rounded-md border border-gray-300 bg-white px-4 py-3 outline-none focus:border-indigo-500"
          />
        </div>

        <!-- BOTÓN -->
        <button
          type="submit"
          class="w-full rounded-md bg-blue-600 py-3 font-semibold text-white transition hover:bg-blue-500"
        >
          Registrarse
        </button>

      </form>

      <!-- DIVIDER -->
      <div class="my-8 flex items-center">

        <div class="h-px flex-1 bg-gray-300"></div>

        <a
          routerLink="/login"
          class="px-4 text-sm font-semibold text-blue-600 hover:text-blue-500"
        >
          ¿Ya estás registrado?
        </a>

        <div class="h-px flex-1 bg-gray-300"></div>

      </div>

    </div>

  </div>

  <!-- LADO DERECHO -->
  <div class="hidden lg:block">

    <img
      src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?q=80&w=1600&auto=format&fit=crop"
      alt="Office"
      class="h-full w-full object-cover"
    />

  </div>

</div>
