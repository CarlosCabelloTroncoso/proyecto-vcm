@if (visible) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center p-4"
    (click)="cancelar.emit()">

    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>

    <!-- Panel -->
    <div
      class="relative z-10 w-full max-w-sm rounded-2xl bg-white shadow-2xl"
      (click)="$event.stopPropagation()">

      <!-- Ícono advertencia -->
      <div class="flex flex-col items-center px-8 pt-8 pb-2 text-center">
        <div class="mb-4 flex h-14 w-14 items-center justify-center rounded-full bg-red-100">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-red-500"
               fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M19 7l-.867 12.142A2 2 0 0 1 16.138 21H7.862a2 2 0 0 1-1.995-1.858L5 7m5 4v6m4-6v6M9 7V4h6v3M3 7h18"/>
          </svg>
        </div>

        <h2 class="text-lg font-bold text-[#1B3A6B]">{{ titulo }}</h2>

        <p class="mt-2 text-sm text-[#1B3A6B]/60">
          {{ descripcion }}
        </p>

        @if (nombreDestacado) {
          <p class="mt-1 text-sm font-semibold text-[#1B3A6B]">
            "{{ nombreDestacado }}"
          </p>
        }
      </div>

      <!-- Acciones -->
      <div class="flex items-center gap-3 px-8 pb-8 pt-5">
        <button
          (click)="cancelar.emit()"
          class="flex-1 rounded-xl border border-[#1B3A6B]/20 px-4 py-2.5 text-sm font-semibold text-[#1B3A6B]/70 transition hover:bg-[#1B3A6B]/5 active:scale-95">
          {{ textoCancelar }}
        </button>
        <button
          (click)="confirmar.emit()"
          class="flex-1 rounded-xl bg-red-500 px-4 py-2.5 text-sm font-semibold text-white shadow transition hover:bg-red-600 active:scale-95">
          {{ textoConfirmar }}
        </button>
      </div>

    </div>
  </div>
}
