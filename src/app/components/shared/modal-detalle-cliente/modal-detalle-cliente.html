@if (visible && cliente) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center p-4"
    (click)="onCerrar()">

    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>

    <!-- Panel -->
    <div
      class="relative z-10 w-full max-w-sm rounded-2xl bg-white shadow-2xl"
      (click)="$event.stopPropagation()">

      <!-- Cabecera con avatar -->
      <div class="flex items-center justify-between border-b border-[#1B3A6B]/10 px-6 py-5">
        <div class="flex items-center gap-4">
          <div class="flex h-12 w-12 shrink-0 items-center justify-center
                      rounded-full bg-[#1B3A6B] text-lg font-bold text-white select-none">
            {{ iniciales }}
          </div>
          <div>
            <h2 class="text-base font-bold text-[#1B3A6B]">{{ nombreCompleto }}</h2>
            <p class="text-xs text-[#1B3A6B]/50">Cliente</p>
          </div>
        </div>
        <button
          (click)="onCerrar()"
          class="rounded-lg p-1.5 text-[#1B3A6B]/40 transition hover:bg-[#1B3A6B]/10 hover:text-[#1B3A6B]">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
               viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Datos -->
      <div class="flex flex-col gap-4 px-6 py-5">

        <!-- RUT -->
        <div class="flex items-center gap-3">
          <div class="flex h-9 w-9 shrink-0 items-center justify-center
                      rounded-lg bg-[#1B3A6B]/8">
            <svg class="h-4 w-4 text-[#1B3A6B]/60" fill="none" stroke="currentColor"
                 stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 002.25-2.25V6.75A2.25
                       2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5zm6-10.125a1.875
                       1.875 0 11-3.75 0 1.875 1.875 0 013.75 0zM12.75 14.625a3.375 3.375 0 10-6.75 0v.25h6.75v-.25z"/>
            </svg>
          </div>
          <div>
            <p class="text-[10px] font-semibold uppercase tracking-wider text-[#1B3A6B]/40">RUT</p>
            <p class="text-sm font-semibold text-[#1B3A6B]">{{ cliente.rut_usuario }}</p>
          </div>
        </div>

        <!-- Teléfono -->
        <div class="flex items-center gap-3">
          <div class="flex h-9 w-9 shrink-0 items-center justify-center
                      rounded-lg bg-[#1B3A6B]/8">
            <svg class="h-4 w-4 text-[#1B3A6B]/60" fill="none" stroke="currentColor"
                 stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/>
            </svg>
          </div>
          <div>
            <p class="text-[10px] font-semibold uppercase tracking-wider text-[#1B3A6B]/40">Teléfono</p>
            <p class="text-sm font-semibold text-[#1B3A6B]">
              {{ cliente.telefono_usuario || '—' }}
            </p>
          </div>
        </div>

      </div>

      <!-- Footer -->
      <div class="border-t border-[#1B3A6B]/10 px-6 py-4 flex justify-end">
        <button
          (click)="onCerrar()"
          class="rounded-xl border border-[#1B3A6B]/20 px-5 py-2.5 text-sm font-semibold
                 text-[#1B3A6B]/70 transition hover:bg-[#1B3A6B]/5 active:scale-95">
          Cerrar
        </button>
      </div>

    </div>
  </div>
}
