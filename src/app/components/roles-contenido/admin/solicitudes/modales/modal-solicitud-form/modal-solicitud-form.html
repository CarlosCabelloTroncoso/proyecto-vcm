@if (visible) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center p-4"
    (click)="onCerrar()">

    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>

    <!-- Panel -->
    <div
      class="relative z-10 w-full max-w-lg rounded-2xl bg-white shadow-2xl"
      (click)="$event.stopPropagation()">

      <!-- ── Cabecera ─────────────────────────────────────────── -->
      <div class="flex items-center justify-between border-b border-[#1B3A6B]/10 px-6 py-5">
        <div>
          <h2 class="text-lg font-bold text-[#1B3A6B]">Editar Solicitud</h2>
          <p class="mt-0.5 text-xs text-[#1B3A6B]/50">
            Modifica los datos de la solicitud seleccionada
          </p>
        </div>
        <button
          (click)="onCerrar()"
          class="rounded-lg p-1.5 text-[#1B3A6B]/40 transition hover:bg-[#1B3A6B]/10 hover:text-[#1B3A6B]">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
               viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- ── Cuerpo ───────────────────────────────────────────── -->
      <div class="max-h-[62vh] space-y-4 overflow-y-auto px-6 py-5">

        <!-- ID Solicitud (solo lectura) -->
        <div class="flex items-center gap-3 rounded-xl bg-[#1B3A6B]/[0.04] px-4 py-2.5">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-[#1B3A6B]/40" fill="none"
               viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z"/>
          </svg>
          <span class="text-xs text-[#1B3A6B]/50">ID Solicitud:</span>
          <span class="font-mono text-xs font-semibold text-[#1B3A6B]">
            #{{ solicitudLocal.id_solicitud }}
          </span>
          <span class="ml-auto text-xs text-[#1B3A6B]/40">
            Usuario #{{ solicitudLocal.id_usuario }}
          </span>
        </div>

        <!-- Título -->
        <div>
          <label class="mb-1.5 block text-xs font-semibold text-[#1B3A6B]">
            Título de la solicitud
          </label>
          <input
            type="text"
            [(ngModel)]="solicitudLocal.titulo_solicitud"
            placeholder="Título descriptivo"
            class="w-full rounded-xl border border-[#1B3A6B]/20 px-3.5 py-2.5 text-sm text-[#1B3A6B]
                   placeholder-[#1B3A6B]/30 outline-none transition
                   focus:border-[#1B3A6B]/60 focus:ring-2 focus:ring-[#1B3A6B]/20"/>
        </div>

        <!-- Descripción -->
        <div>
          <label class="mb-1.5 block text-xs font-semibold text-[#1B3A6B]">
            Descripción
          </label>
          <textarea
            [(ngModel)]="solicitudLocal.descripcion_solicitud"
            placeholder="Descripción detallada de la solicitud…"
            rows="3"
            class="w-full resize-none rounded-xl border border-[#1B3A6B]/20 px-3.5 py-2.5 text-sm
                   text-[#1B3A6B] placeholder-[#1B3A6B]/30 outline-none transition
                   focus:border-[#1B3A6B]/60 focus:ring-2 focus:ring-[#1B3A6B]/20">
          </textarea>
        </div>

        <!-- Fecha de creación (solo lectura) -->
        <div>
          <label class="mb-1.5 block text-xs font-semibold text-[#1B3A6B]">
            Fecha de creación
            <span class="ml-1 font-normal text-[#1B3A6B]/40">(no editable)</span>
          </label>
          <input
            type="text"
            [value]="solicitudLocal.fecha_creacion_solicitud"
            disabled
            class="w-full cursor-not-allowed rounded-xl border border-[#1B3A6B]/10 bg-[#1B3A6B]/[0.04]
                   px-3.5 py-2.5 text-sm text-[#1B3A6B]/40 outline-none"/>
        </div>

        <!-- Estado -->
        <div>
          <label class="mb-1.5 block text-xs font-semibold text-[#1B3A6B]">Estado</label>
          <select
            [(ngModel)]="solicitudLocal.id_estado"
            class="w-full rounded-xl border border-[#1B3A6B]/20 px-3.5 py-2.5 text-sm text-[#1B3A6B]
                   outline-none transition focus:border-[#1B3A6B]/60 focus:ring-2 focus:ring-[#1B3A6B]/20">
            @for (estado of estados; track estado.id_estado) {
              <option [value]="estado.id_estado">{{ estado.nombre_estado }}</option>
            }
          </select>
        </div>

        <!-- Carrera / Ciudad -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="mb-1.5 block text-xs font-semibold text-[#1B3A6B]">Carrera</label>
            <select
              [(ngModel)]="solicitudLocal.id_carrera"
              class="w-full rounded-xl border border-[#1B3A6B]/20 px-3.5 py-2.5 text-sm text-[#1B3A6B]
                     outline-none transition focus:border-[#1B3A6B]/60 focus:ring-2 focus:ring-[#1B3A6B]/20">
              @for (carrera of carreras; track carrera.id_carrera) {
                <option [value]="carrera.id_carrera">{{ carrera.nombre_carrera }}</option>
              }
            </select>
          </div>
          <div>
            <label class="mb-1.5 block text-xs font-semibold text-[#1B3A6B]">Ciudad</label>
            <select
              [(ngModel)]="solicitudLocal.id_ciudad"
              class="w-full rounded-xl border border-[#1B3A6B]/20 px-3.5 py-2.5 text-sm text-[#1B3A6B]
                     outline-none transition focus:border-[#1B3A6B]/60 focus:ring-2 focus:ring-[#1B3A6B]/20">
              @for (ciudad of ciudades; track ciudad.id_ciudad) {
                <option [value]="ciudad.id_ciudad">{{ ciudad.nombre_ciudad }}</option>
              }
            </select>
          </div>
        </div>

      </div>

      <!-- ── Pie ─────────────────────────────────────────────── -->
      <div class="flex items-center justify-end gap-3 border-t border-[#1B3A6B]/10 px-6 py-4">
        <button
          (click)="onCerrar()"
          class="rounded-xl border border-[#1B3A6B]/20 px-5 py-2.5 text-sm font-semibold
                 text-[#1B3A6B]/70 transition hover:bg-[#1B3A6B]/5 active:scale-95">
          Cancelar
        </button>
        <button
          (click)="onGuardar()"
          class="rounded-xl bg-[#1B3A6B] px-5 py-2.5 text-sm font-semibold text-white
                 shadow transition hover:bg-[#142d54] active:scale-95">
          Guardar cambios
        </button>
      </div>

    </div>
  </div>
}
