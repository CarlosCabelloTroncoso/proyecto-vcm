@if (visible) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center p-4"
    (click)="onCerrar()">

    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>

    <!-- Panel -->
    <div
      class="relative z-10 w-full max-w-lg rounded-2xl bg-white shadow-2xl"
      (click)="$event.stopPropagation()">

      <!-- ── Cabecera ───────────────────────────────────────── -->
      <div class="flex items-center justify-between border-b border-[#1B3A6B]/10 px-6 py-5">
        <div>
          <h2 class="text-lg font-bold text-[#1B3A6B]">
            {{ modoEdicion ? 'Editar Usuario' : 'Crear Usuario' }}
          </h2>
          <p class="mt-0.5 text-xs text-[#1B3A6B]/50">
            {{ modoEdicion ? 'Modifica los datos del usuario seleccionado' : 'Completa los datos del nuevo usuario' }}
          </p>
        </div>
        <button
          (click)="onCerrar()"
          class="rounded-lg p-1.5 text-[#1B3A6B]/40 transition hover:bg-[#1B3A6B]/10 hover:text-[#1B3A6B]">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
               viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- ── Cuerpo ─────────────────────────────────────────── -->
      <div class="max-h-[62vh] space-y-4 overflow-y-auto px-6 py-5">

        <!-- RUT -->
        <div>
          <label class="mb-1.5 block text-xs font-semibold text-[#1B3A6B]">RUT</label>
          <input
            type="text"
            [(ngModel)]="usuarioLocal.rut_usuario"
            placeholder="Ej: 12.345.678-9"
            class="w-full rounded-xl border border-[#1B3A6B]/20 px-3.5 py-2.5 text-sm text-[#1B3A6B]
                   placeholder-[#1B3A6B]/30 outline-none transition
                   focus:border-[#1B3A6B]/60 focus:ring-2 focus:ring-[#1B3A6B]/20"/>
        </div>

        <!-- Nombres / Apellidos -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="mb-1.5 block text-xs font-semibold text-[#1B3A6B]">Nombres</label>
            <input
              type="text"
              [(ngModel)]="usuarioLocal.nombres_usuario"
              placeholder="Nombre(s)"
              class="w-full rounded-xl border border-[#1B3A6B]/20 px-3.5 py-2.5 text-sm text-[#1B3A6B]
                     placeholder-[#1B3A6B]/30 outline-none transition
                     focus:border-[#1B3A6B]/60 focus:ring-2 focus:ring-[#1B3A6B]/20"/>
          </div>
          <div>
            <label class="mb-1.5 block text-xs font-semibold text-[#1B3A6B]">Apellidos</label>
            <input
              type="text"
              [(ngModel)]="usuarioLocal.apellidos_usuario"
              placeholder="Apellido(s)"
              class="w-full rounded-xl border border-[#1B3A6B]/20 px-3.5 py-2.5 text-sm text-[#1B3A6B]
                     placeholder-[#1B3A6B]/30 outline-none transition
                     focus:border-[#1B3A6B]/60 focus:ring-2 focus:ring-[#1B3A6B]/20"/>
          </div>
        </div>

        <!-- Teléfono -->
        <div>
          <label class="mb-1.5 block text-xs font-semibold text-[#1B3A6B]">Teléfono</label>
          <input
            type="tel"
            [(ngModel)]="usuarioLocal.telefono_usuario"
            placeholder="+56 9 XXXX XXXX"
            class="w-full rounded-xl border border-[#1B3A6B]/20 px-3.5 py-2.5 text-sm text-[#1B3A6B]
                   placeholder-[#1B3A6B]/30 outline-none transition
                   focus:border-[#1B3A6B]/60 focus:ring-2 focus:ring-[#1B3A6B]/20"/>
        </div>

        <!-- Contraseña -->
        <div>
          <label class="mb-1.5 block text-xs font-semibold text-[#1B3A6B]">
            Contraseña
            @if (modoEdicion) {
              <span class="ml-1 font-normal text-[#1B3A6B]/40">
                (deja en blanco para no cambiar)
              </span>
            }
          </label>
          <div class="relative">
            <input
              [type]="mostrarPassword ? 'text' : 'password'"
              [(ngModel)]="usuarioLocal.password_usuario"
              placeholder="••••••••"
              class="w-full rounded-xl border border-[#1B3A6B]/20 px-3.5 py-2.5 pr-11 text-sm text-[#1B3A6B]
                     placeholder-[#1B3A6B]/30 outline-none transition
                     focus:border-[#1B3A6B]/60 focus:ring-2 focus:ring-[#1B3A6B]/20"/>
            <!-- Toggle visibilidad -->
            <button
              type="button"
              (click)="mostrarPassword = !mostrarPassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-[#1B3A6B]/40 transition hover:text-[#1B3A6B]">
              @if (mostrarPassword) {
                <!-- Ojo tachado -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M13.875 18.825A10.05 10.05 0 0 1 12 19c-5 0-9-4-9-7s4-7 9-7
                       a9.97 9.97 0 0 1 5.657 1.757M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0zM3 3l18 18"/>
                </svg>
              } @else {
                <!-- Ojo abierto -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7
                       -1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              }
            </button>
          </div>
        </div>

        <!-- Rol / Estado -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="mb-1.5 block text-xs font-semibold text-[#1B3A6B]">Rol</label>
            <select
              [(ngModel)]="usuarioLocal.id_rol"
              class="w-full rounded-xl border border-[#1B3A6B]/20 px-3.5 py-2.5 text-sm text-[#1B3A6B]
                     outline-none transition focus:border-[#1B3A6B]/60 focus:ring-2 focus:ring-[#1B3A6B]/20">
              @for (rol of roles; track rol.id_rol) {
                <option [value]="rol.id_rol">{{ rol.nombre_rol }}</option>
              }
            </select>
          </div>
          <div>
            <label class="mb-1.5 block text-xs font-semibold text-[#1B3A6B]">Estado</label>
            <select
              [(ngModel)]="usuarioLocal.is_active"
              class="w-full rounded-xl border border-[#1B3A6B]/20 px-3.5 py-2.5 text-sm text-[#1B3A6B]
                     outline-none transition focus:border-[#1B3A6B]/60 focus:ring-2 focus:ring-[#1B3A6B]/20">
              <option [value]="true">Activo</option>
              <option [value]="false">Inactivo</option>
            </select>
          </div>
        </div>

      </div>

      <!-- ── Pie ───────────────────────────────────────────── -->
      <div class="flex items-center justify-end gap-3 border-t border-[#1B3A6B]/10 px-6 py-4">
        <button
          (click)="onCerrar()"
          class="rounded-xl border border-[#1B3A6B]/20 px-5 py-2.5 text-sm font-semibold
                 text-[#1B3A6B]/70 transition hover:bg-[#1B3A6B]/5 active:scale-95">
          Cancelar
        </button>
        <button
          (click)="onGuardar()"
          class="rounded-xl bg-[#1B3A6B] px-5 py-2.5 text-sm font-semibold text-white
                 shadow transition hover:bg-[#142d54] active:scale-95">
          {{ modoEdicion ? 'Guardar cambios' : 'Crear usuario' }}
        </button>
      </div>

    </div>
  </div>
}
