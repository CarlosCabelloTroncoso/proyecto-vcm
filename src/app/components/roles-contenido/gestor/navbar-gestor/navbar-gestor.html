<nav class="sticky top-0 z-50 border-b border-[#1B3A6B]/10 bg-[#1B3A6B] text-white">
  <div class="mx-auto max-w-7xl px-4 lg:px-8">
    <div class="flex h-16 items-center justify-between lg:h-20">

      <!-- Logo -->
      <div class="flex items-center gap-3">
        <img src="images/escudo-ucm.png" alt="UCM"
             class="h-9 w-9 brightness-0 invert" />
        <span class="hidden text-lg font-bold tracking-wide sm:inline">
          UCM Vinculación
        </span>
      </div>

      <!-- Desktop nav -->
      <div class="hidden lg:flex items-center gap-1">
        <a routerLink="/gestor/inicio"
           routerLinkActive="bg-white/20"
           class="rounded-xl px-5 py-2.5 text-sm font-medium transition hover:bg-white/15">
          Inicio
        </a>
        <a routerLink="/gestor/ver-solicitudes"
           routerLinkActive="bg-white/20"
           class="rounded-xl px-5 py-2.5 text-sm font-medium transition hover:bg-white/15">
          Ver Solicitudes
        </a>
      </div>

      <!-- Profile -->
      <div class="hidden md:flex items-center">
        <div class="relative">
          <button (click)="profileMenuOpen = !profileMenuOpen"
                  class="flex items-center gap-3 rounded-xl px-3 py-1.5
                         transition hover:bg-white/10 cursor-pointer">
            <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=80&h=80&fit=crop"
                 alt="Perfil"
                 class="h-9 w-9 rounded-full border-2 border-white/30 object-cover" />
            <span class="hidden text-sm font-medium lg:inline">Mi Cuenta</span>
            <svg class="h-4 w-4 opacity-60" fill="none" stroke="currentColor"
                 stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
            </svg>
          </button>

          @if (profileMenuOpen) {
            <div class="absolute right-0 mt-2 w-56 overflow-hidden rounded-2xl
                        border border-gray-200 bg-white shadow-xl">
              <div class="border-b border-gray-100 px-4 py-3">
                <p class="text-sm font-semibold text-[#1B3A6B]">Gestor Demo</p>
                <p class="text-xs text-[#1B3A6B]/50">gestor@ucm.cl</p>
              </div>
              <a href="#" class="block px-4 py-3 text-sm text-[#1B3A6B] transition hover:bg-[#1B3A6B]/5">
                Mi Perfil
              </a>
              <div class="border-t border-gray-100"></div>
              <a routerLink="/login"
                 class="block px-4 py-3 text-sm text-red-500 transition hover:bg-red-50">
                Cerrar sesión
              </a>
            </div>
          }
        </div>
      </div>

      <!-- Hamburger -->
      <button class="rounded-lg p-2 text-white transition hover:bg-white/10 lg:hidden"
              (click)="mobileMenuOpen = !mobileMenuOpen">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          @if (!mobileMenuOpen) {
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
          } @else {
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          }
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  @if (mobileMenuOpen) {
    <div class="border-t border-white/10 px-4 py-4 lg:hidden space-y-1">
      <a routerLink="/gestor/inicio" (click)="mobileMenuOpen = false"
         routerLinkActive="bg-white/20"
         class="block rounded-xl px-4 py-3 text-sm hover:bg-white/10">
        Inicio
      </a>
      <a routerLink="/gestor/ver-solicitudes" (click)="mobileMenuOpen = false"
         routerLinkActive="bg-white/20"
         class="block rounded-xl px-4 py-3 text-sm hover:bg-white/10">
        Ver Solicitudes
      </a>
      <div class="mt-3 border-t border-white/10 pt-3">
        <a routerLink="/login" (click)="mobileMenuOpen = false"
           class="block rounded-xl px-4 py-3 text-sm text-red-300 hover:bg-white/10">
          Cerrar sesión
        </a>
      </div>
    </div>
  }
</nav>
