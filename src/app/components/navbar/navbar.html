<header class="sticky top-0 z-50 border-b border-[#1B3A6B]/10 bg-white text-[#1B3A6B] shadow-sm">

  <nav class="mx-auto max-w-7xl px-4 lg:px-8">

    <div class="flex h-20 items-center justify-between">

      <!-- LOGO -->
      <div class="flex items-center gap-3">

        <img
          src="images/escudo-ucm.png"
          alt="UCM"
          class="h-11 w-auto"
        />

        <span
          class="text-sm font-bold uppercase tracking-[0.2em] text-[#1B3A6B] sm:text-base"
        >
          UCM Vinculación
        </span>

      </div>

      <!-- MENU DESKTOP -->
      <div class="hidden lg:flex items-center gap-2">

        <a
          routerLink="/"
          routerLinkActive="bg-[#1B3A6B] text-white"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-xl px-5 py-2.5 text-sm font-medium transition hover:bg-[#1B3A6B]/10"
        >
          Inicio
        </a>

        <a
          href="#"
          class="rounded-xl px-5 py-2.5 text-sm font-medium transition hover:bg-[#1B3A6B]/10"
        >
          Universidad
        </a>

      </div>

      <!-- ACTIONS DESKTOP -->
      <div class="hidden lg:flex items-center gap-3">

        <a
          routerLink="/login"
          class="rounded-xl border border-[#1B3A6B]/20 px-5 py-2.5 text-sm font-semibold transition hover:bg-[#1B3A6B]/10"
        >
          Ingresar
        </a>

        <a
          routerLink="/registro"
          class="rounded-xl bg-[#1B3A6B] px-5 py-2.5 text-sm font-semibold text-white transition hover:scale-[1.02] hover:bg-[#16315b]"
        >
          Registrarse
        </a>

      </div>

      <!-- MOBILE BUTTON -->
      <button
        class="rounded-xl p-2 transition hover:bg-[#1B3A6B]/10 lg:hidden"
        (click)="toggleMobileMenu()"
      >

        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-7 w-7"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >

          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />

        </svg>

      </button>

    </div>

    <!-- MOBILE MENU -->
    @if (mobileMenuOpen) {

      <div class="border-t border-[#1B3A6B]/10 py-4 lg:hidden">

        <div class="flex flex-col gap-3">

          <!-- LINKS -->
          <a
            routerLink="/"
            class="rounded-xl bg-[#1B3A6B]/10 px-4 py-3 text-sm font-medium"
          >
            Inicio
          </a>

          <a
            href="#"
            class="rounded-xl px-4 py-3 text-sm font-medium transition hover:bg-[#1B3A6B]/10"
          >
            Universidad
          </a>

          <!-- ACTIONS -->
          <div class="mt-2 flex flex-col gap-3">

            <a
              routerLink="/login"
              class="rounded-xl border border-[#1B3A6B]/20 px-4 py-3 text-center text-sm font-semibold transition hover:bg-[#1B3A6B]/10"
            >
              Ingresar
            </a>

            <a
              routerLink="/registro"
              class="rounded-xl bg-[#1B3A6B] px-4 py-3 text-center text-sm font-semibold text-white"
            >
              Registrarse
            </a>

          </div>

        </div>

      </div>

    }

  </nav>

</header>
